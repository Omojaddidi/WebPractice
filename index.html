<!--DOCTYPE indicates that we are using the latest
version of HTML, and also ensures no-qurks mode rendering
    Basically no-quirks mode ensures rendering follows
    proper specification of the CSS langauge-->
 <!DOCTYPE html>
 <!--HTML is the root element of the language,
    think of root like the "Object" class in Java
    every subclass inherits from Object similar to
    how every element inherits from html-->
<html lang="en">
    <!--head includes any metadata information-->
    <head>
        <!-- use UTF-8 encoding,
        we will work more with meta later-->
        <meta charset="UTF-8">
        <!--title is showcased as the title of the document-->
        <title>Web Practice</title>
        <!-- specifices relationship between our stylesheet
         and this document-->
        <link href="index_style.css" rel="stylesheet">
        
    </head>
    <body>
        <h1>HTML and CSS practice</h1>
        <p>
            Here are some links to more specified practice: <br>
            <a href="html_values.html">To the place</a>
        </p>

    </body>
</html>
